<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка — TL:TECH</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <!-- Шапка админки -->
  <header class="admin-header">
    <h1 class="admin-header__title">Админка TL:TECH</h1>
    <a class="admin-header__link" href="/" target="_blank">Открыть публичный сайт →</a>
  </header>

  <main class="admin">

    <!-- ===== Hero ===== -->
    <section class="admin-section" id="hero-admin">
      <h2 class="admin-section__title">Hero</h2>

      <form id="hero-admin-form">
        <div class="admin-field">
          <label class="admin-field__label" for="hero-title-input">Заголовок</label>
          <input class="admin-field__input" id="hero-title-input" name="title" type="text">
        </div>

        <div class="admin-field">
          <label class="admin-field__label" for="hero-subtitle-input">Подзаголовок</label>
          <textarea class="admin-field__input" id="hero-subtitle-input" name="subtitle" rows="3"></textarea>
        </div>

        <div class="admin-card__header">
          <span class="admin-card__label">Статистика</span>
        </div>

        <div id="hero-stats-admin" class="admin-list"></div>

        <div class="admin-actions">
          <button type="submit" class="admin-btn admin-btn--primary">
            Сохранить Hero
          </button>
        </div>

        <p id="hero-status" class="admin-status"></p>
      </form>

    </section>

    <!-- ===== Команда (наша секция) ===== -->
    <section class="admin-section" id="team-admin">
      <h2 class="admin-section__title">Команда</h2>

      <!-- Сюда admin.js вставит карточки сотрудников. По одной форме на человека. -->
      <div id="team-members" class="admin-list"></div>

      <!-- Действия: добавить нового, сохранить всё -->
      <div class="admin-actions">
        <button type="button" id="add-member-btn" class="admin-btn">
          + Добавить сотрудника
        </button>
        <button type="button" id="save-team-btn" class="admin-btn admin-btn--primary">
          Сохранить изменения команды
        </button>
      </div>

      <!-- Сюда admin.js будет писать «Сохранено» или сообщения об ошибке -->
      <p id="team-status" class="admin-status"></p>
    </section>

    <!-- ===== Клиенты ===== -->
    <section class="admin-section" id="clients-admin">
      <h2 class="admin-section__title">Клиенты</h2>

      <!-- Сюда admin-logo.js вставит карточки логотипов клиентов. -->
      <div id="client-logos" class="admin-list"></div>

      <div class="admin-actions">
        <button type="button" id="add-logo-btn" class="admin-btn">
          + Добавить логотип
        </button>
        <button type="button" id="save-logo-btn" class="admin-btn admin-btn--primary">
          Сохранить логотипы клиентов
        </button>
      </div>

      <p id="logo-status" class="admin-status"></p>
    </section>

    <!-- ===== Вакансии ===== -->
    <section class="admin-section" id="vacancies-admin">
      <h2 class="admin-section__title">Вакансии</h2>
      <!-- TODO: форму делает кто-то другой -->
      <p class="admin-section__placeholder">Здесь будет форма редактирования вакансий.</p>
    </section>

    <!-- ===== Плюшки ===== -->
    <section class="admin-section" id="benefits-admin">
      <h2 class="admin-section__title">Плюшки</h2>
      <!-- TODO: форму делает кто-то другой -->
      <p class="admin-section__placeholder">Здесь будет форма редактирования плюшек.</p>
    </section>

  </main>

  <!-- Каждая секция админки — в своём JS-файле. Так у студентов нет мерж-конфликтов. -->
  <script src="/js/admin-team.js"></script>
  <script src="/js/admin-hero.js"></script>
  <script src="/js/admin-logo.js"></script>
</body>
</html>
