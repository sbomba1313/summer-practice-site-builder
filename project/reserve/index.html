<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Актуальные вакансии и команда TravelLine Tech">
  <title>TL:TECH</title>
  <link rel="stylesheet" href="/blocks/css/main.css">
</head>
<body>
  <main>
    <!-- Блок Hero -->
    <section class="hero">
      <div class="hero__content">
        <p class="hero__label">TravelLine Tech</p>
        <h1 id="hero-title"></h1>
        <p id="hero-subtitle"></p>
        <ul id="hero-stats" class="hero__stats"></ul>
      </div>
    </section>

    <!-- Блок Команда -->
    <section class="team">
      <h2 id="team-title">Любим и бережем свою команду</h2>
      <p id="team-subtitle">300+ человек, которые вдохновляют своими достижениями</p>
      <ul id="team-list" class="team__list"></ul>
    </section>

    <!-- Блок Клиенты -->
    <section class="brands">
      <ul id="clients-list" class="brands__list"></ul>
    </section>

    <!-- Блок Вакансии -->
    <section class="vacancies">
      <h2 id="vacancies-title">Ищем прямо сейчас</h2>
      <div id="vacancies-list" class="vacancies__list"></div>
    </section>

    <!-- Блок Плюшки -->
    <section class="bonus">
      <h2 id="benefits-title">Плюшки и все такое</h2>
      <div id="plushki-grid" class="bonus__grid"></div>
    </section>
  </main>

  <script src="/js/main.js"></script>
</body>
</html>
